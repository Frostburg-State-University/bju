site_name: Software Engineering Economics
site_description: Course site for Software Engineering Economics — Frostburg State University, Summer 2026
site_author: Dr. Zhijiang Chen
site_url: https://frostburg-state-university.github.io/bju/
repo_url: https://github.com/Frostburg-State-University/bju
repo_name: Frostburg-State-University/bju
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: material/calculator-variant
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Frostburg-State-University
  copyright: >
    Copyright &copy; 2026 Dr. Zhijiang Chen — Frostburg State University

nav:
  - Home: index.md
  - Syllabus: syllabus.md
  - Lectures:
      - "Lec 1 — Introduction": lectures/lecture-01-introduction.md
      - "Lec 2 — Cost Concepts & Lifecycle Cost": lectures/lecture-02-cost-concepts.md
      - "Lec 3 — Time Value of Money": lectures/lecture-03-time-value.md
      - "Lec 4 — Cash Flow & Equivalence": lectures/lecture-04-cash-flow.md
      - "Lec 5 — Investment Decisions & Alternative Selection": lectures/lecture-05-investment-decisions.md
      - "Lec 6 — Break-even & Sensitivity Analysis": lectures/lecture-06-breakeven-sensitivity.md
      - "Lec 7 — Risk & Decision under Uncertainty": lectures/lecture-07-risk-decision.md
      - "Lec 8 — Cost Estimation I: Size Metrics": lectures/lecture-08-estimation-size.md
      - "Lec 9 — Cost Estimation II: COCOMO II": lectures/lecture-09-cocomo.md
      - "Lec 10 — Quality & Maintenance Economics": lectures/lecture-10-quality-maintenance.md
      - "Lec 11 — Build/Buy/Reuse & VBSE": lectures/lecture-11-build-buy-reuse.md
      - "Lec 12 — AI Topic I: Estimation & Productivity": lectures/lecture-12-ai-estimation.md
      - "Lec 13 — AI Topic II: Token Economics & ROI": lectures/lecture-13-ai-token-economics.md
      - "Lec 14 — Student Presentations (Part 1)": lectures/lecture-14-presentations-1.md
      - "Lec 15 — Student Presentations (Part 2)": lectures/lecture-15-presentations-2.md
      - "Lec 16 — Final Exam": lectures/lecture-16-final-exam.md
